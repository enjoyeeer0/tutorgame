<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Тёмный фон с закруглёнными углами -->
  <rect width="100" height="100" rx="20" fill="#111111"/>

  <!-- Верхняя грань куба -->
  <polygon
    points="50,14 82,31 50,48 18,31"
    fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"
  />

  <!-- Левая грань куба -->
  <polygon
    points="18,31 50,48 50,84 18,67"
    fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"
  />

  <!-- Правая грань куба -->
  <polygon
    points="82,31 50,48 50,84 82,67"
    fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"
  />

  <!-- Ромб на верхней грани (внутренняя деталь) -->
  <polygon
    points="50,22 63,29 50,37 37,29"
    fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"
  />

  <!-- Прямоугольник на левой грани (внутренняя деталь) -->
  <polygon
    points="24,38 44,49 44,67 24,56"
    fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"
  />

  <!-- Прямоугольник на правой грани (внутренняя деталь) -->
  <polygon
    points="76,38 56,49 56,67 76,56"
    fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round"
  />
</svg>
